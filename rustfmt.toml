# Rust formatting configuration for Agentic Database
# Only stable rustfmt options (compatible with stable toolchain)

max_width = 100
hard_tabs = false
tab_spaces = 4
edition = "2021"
newline_style = "Unix"
use_small_heuristics = "Default"
match_block_trailing_comma = true
reorder_imports = true
remove_nested_parens = true
