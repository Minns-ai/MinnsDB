version: "3.8"

services:
  # Qdrant vector store — sidecar for MinnsDB's embedding collections
  # (nodes / edges / claims / memories). The MinnsDB service refuses to
  # start if this container is unreachable, so it is a hard dependency.
  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: minns-qdrant
    restart: unless-stopped
    ports:
      # gRPC (used by the Rust client). Bind to loopback only so the
      # vector store is not exposed publicly.
      - "127.0.0.1:6334:6334"
      # HTTP/REST is opt-in for debugging; comment out in production.
      - "127.0.0.1:6333:6333"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      # Set an API key in your .env file if you want to require auth
      # between MinnsDB and Qdrant. Leave empty for trusted local-only.
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6334' || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - minns-network

  # MinnsDB Main Service
  # Note: NER service runs on separate server
  minnsdb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minnsdb
    image: minnsdb:latest
    depends_on:
      qdrant:
        condition: service_healthy

    ports:
      - "3000:3000"  # API + /metrics (Prometheus scrape target)

    environment:
      - RUST_LOG=info
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3000
      - STORAGE_BACKEND=persistent
      - REDB_PATH=/data/minns.redb
      - REDB_CACHE_SIZE_MB=256
      - MEMORY_CACHE_SIZE=10000
      - STRATEGY_CACHE_SIZE=5000
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=gpt-4o-mini
      # NER Service Configuration (external server)
      - NER_SERVICE_URL=${NER_SERVICE_URL:-http://localhost:8081/ner}
      - NER_REQUEST_TIMEOUT_MS=${NER_REQUEST_TIMEOUT_MS:-5000}
      # Vector store (Qdrant sidecar above). The hostname `qdrant`
      # resolves on the `minns-network` bridge; override QDRANT_URL when
      # pointing at an external Qdrant cluster.
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6334}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_COLLECTION_PREFIX=${QDRANT_COLLECTION_PREFIX:-}

    volumes:
      - minns-data:/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    networks:
      - minns-network

volumes:
  minns-data:
    driver: local
  qdrant-data:
    driver: local

networks:
  minns-network:
    driver: bridge
