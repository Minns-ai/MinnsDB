version: "3.8"

services:
  # EventGraphDB Main Service
  # Note: NER service runs on separate server
  eventgraphdb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventgraphdb
    image: eventgraphdb:latest

    ports:
      - "3000:3000"
      - "127.0.0.1:9090:9090"  # Metrics endpoint (not implemented)

    environment:
      - RUST_LOG=info
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3000
      - STORAGE_BACKEND=persistent
      - REDB_PATH=/data/eventgraph.redb
      - REDB_CACHE_SIZE_MB=256
      - MEMORY_CACHE_SIZE=10000
      - STRATEGY_CACHE_SIZE=5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_MODEL=gpt-4o-mini
      # NER Service Configuration (external server)
      - NER_SERVICE_URL=${NER_SERVICE_URL:-http://localhost:8081/ner}
      - NER_REQUEST_TIMEOUT_MS=${NER_REQUEST_TIMEOUT_MS:-5000}

    volumes:
      - eventgraph-data:/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    networks:
      - eventgraph-network

volumes:
  eventgraph-data:
    driver: local

networks:
  eventgraph-network:
    driver: bridge