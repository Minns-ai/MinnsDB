<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventGraphDB Studio</title>
    <link rel="stylesheet" href="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-title">EventGraphDB</div>
          <div class="brand-subtitle">Studio</div>
        </div>
        <nav class="nav">
          <button class="nav-item active" data-view="graph">Graph</button>
          <button class="nav-item" data-view="agent-demo">Agent Demo</button>
          <button class="nav-item" data-view="events">Events</button>
          <button class="nav-item" data-view="episodes">Episodes</button>
          <button class="nav-item" data-view="memories">Memories</button>
          <button class="nav-item" data-view="strategies">Strategies</button>
          <button class="nav-item" data-view="stats">Stats</button>
        </nav>
      </aside>
      <main class="main">
        <header class="topbar">
          <div class="status-line">
            Server:
            <span id="connection-status" class="status disconnected">Disconnected</span>
          </div>
          <div class="controls">
            <label class="toggle">
              <input type="checkbox" id="auto-refresh-toggle" />
              <span>Auto-refresh</span>
            </label>
            <button id="refresh-btn" class="btn">Refresh</button>
          </div>
        </header>
        <section class="views">
          <div id="graph-view" class="view-container">
            <div class="graph-layout">
              <div id="graph-canvas" class="graph-canvas"></div>
              <div id="details-panel" class="details-panel"></div>
            </div>
          </div>
          <div id="agent-demo-view" class="view-container" style="display: none;"></div>
          <div id="events-view" class="view-container" style="display: none;"></div>
          <div id="episodes-view" class="view-container" style="display: none;"></div>
          <div id="memories-view" class="view-container" style="display: none;"></div>
          <div id="strategies-view" class="view-container" style="display: none;"></div>
          <div id="stats-view" class="view-container" style="display: none;"></div>
        </section>
      </main>
    </div>
    <script src="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
