      responses:
        "200":
          description: Usage reset
          content:
            application/json:
              schema:
                type: object
                required: [previous_period, reset]
                properties:
                  previous_period:
                    type: object
                  reset:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"

  /api/modules/{name}/schedules:
    get:
      operationId: listModuleSchedules
      tags: [WASM]
      summary: List module schedules
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createModuleSchedule
      tags: [WASM]
      summary: Create a module schedule
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cron, function]
              properties:
                cron:
                  type: string
                function:
                  type: string
      responses:
        "201":
          description: Schedule created
          content:
            application/json:
              schema:
                type: object
                required: [schedule_id]
                properties:
                  schedule_id:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/modules/{name}/schedules/{id}:
    delete:
      operationId: deleteModuleSchedule
      tags: [WASM]
      summary: Delete a module schedule
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Schedule deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"

  /api/keys:
    post:
      operationId: createApiKey
      tags: [Auth]
      summary: Create API key (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                group_id:
                  type: string
                permissions:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                type: object
                required: [key, name, permissions, warning]
                properties:
                  key:
                    type: string
                    description: "API key with mndb_ prefix"
                  name:
                    type: string
                  group_id:
                    type: string
                  permissions:
                    type: array
                    items:
                      type: string
                  warning:
                    type: string
    get:
      operationId: listApiKeys
      tags: [Auth]
      summary: List API keys
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKeyInfo"

  /api/keys/{name}:
    delete:
      operationId: deleteApiKey
      tags: [Auth]
      summary: Delete API key
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/export:
    post:
      operationId: exportDatabase
      tags: [Admin]
      summary: Export database
      responses:
        "200":
          description: Database export
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /api/admin/import:
    post:
      operationId: importDatabase
      tags: [Admin]
      summary: Import database
      parameters:
        - name: mode
          in: query
          schema:
            type: string
            enum: [replace, merge]
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResponse"

  /api/planning/strategies:
    post:
      operationId: generateStrategies
      tags: [Planning]
      summary: Generate strategies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Strategies generated
          content:
            application/json:
              schema:
                type: object

  /api/planning/actions:
    post:
      operationId: generateActions
      tags: [Planning]
      summary: Generate actions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Actions generated
          content:
            application/json:
              schema:
                type: object

  /api/planning/plan:
    post:
      operationId: planForGoal
      tags: [Planning]
      summary: Plan for a goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Plan generated
          content:
            application/json:
              schema:
                type: object

  /api/planning/execute:
    post:
      operationId: startExecution
      tags: [Planning]
      summary: Start plan execution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Execution started
          content:
            application/json:
              schema:
                type: object

  /api/planning/validate:
    post:
      operationId: validateExecution
      tags: [Planning]
      summary: Validate execution event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                type: object

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "API key with mndb_ prefix. Pass as Bearer token in Authorization header."

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        details:
          type: string

    Event:
      type: object
      description: A full event object with context and data

    EventContext:
      type: object
      description: Context object for event correlation

    EventResponse:
      type: object
      required: [success, event_id, nodes_created, patterns_detected, processing_time_ms]
      properties:
        success:
          type: boolean
        event_id:
          type: integer
        nodes_created:
          type: integer
        patterns_detected:
          type: integer
        processing_time_ms:
          type: number
          format: double

    SimpleEventRequest:
      type: object
      required: [agent_id, agent_type, session_id, action, data]
      properties:
        agent_id:
          type: integer
        agent_type:
          type: string
        session_id:
          type: integer
        action:
          type: string
        data:
          type: object
        success:
          type: boolean
        enable_semantic:
          type: boolean

    StateChangeEventRequest:
      type: object
      required: [agent_id, agent_type, session_id, entity, new_state]
      properties:
        agent_id:
          type: integer
        agent_type:
          type: string
        session_id:
          type: integer
        entity:
          type: string
        new_state:
          type: string
        old_state:
          type: string
        trigger:
          type: string
        extra_metadata:
          type: object
        enable_semantic:
          type: boolean

    TransactionEventRequest:
      type: object
      required: [agent_id, agent_type, session_id, from, to, amount]
      properties:
        agent_id:
          type: integer
        agent_type:
          type: string
        session_id:
          type: integer
        from:
          type: string
        to:
          type: string
        amount:
          type: number
          format: double
        direction:
          type: string
        description:
          type: string
        extra_metadata:
          type: object
        enable_semantic:
          type: boolean

    CodeReviewEventRequest:
      type: object
      required: [agent_id, agent_type, session_id, review_id, action, body, repository]
      properties:
        agent_id:
          type: integer
        agent_type:
          type: string
        session_id:
          type: integer
        review_id:
          type: string
        action:
          type: string
        body:
          type: string
        file_path:
          type: string
        line_range:
          type: array
          items:
            type: integer
          minItems: 2
          maxItems: 2
        repository:
          type: string
        title:
          type: string
        enable_semantic:
          type: boolean

    CodeFileEventRequest:
      type: object
      required: [agent_id, agent_type, session_id, file_path, content]
      properties:
        agent_id:
          type: integer
        agent_type:
          type: string
        session_id:
          type: integer
        file_path:
          type: string
        content:
          type: string
        language:
          type: string
        repository:
          type: string
        git_ref:
          type: string
        enable_ast:
          type: boolean
        enable_semantic:
          type: boolean

    CodeSearchRequest:
      type: object
      properties:
        name_pattern:
          type: string
        kind:
          type: string
        language:
          type: string
        file_pattern:
          type: string
        limit:
          type: integer

    CodeSearchResponse:
      type: object
      required: [entities, total_matches]
      properties:
        entities:
          type: array
          items:
            $ref: "#/components/schemas/CodeEntity"
        total_matches:
          type: integer

    CodeEntity:
      type: object
      required: [name, qualified_name, kind, file_path, language]
      properties:
        name:
          type: string
        qualified_name:
          type: string
        kind:
          type: string
        file_path:
          type: string
        language:
          type: string
        line_range:
          type: array
          items:
            type: integer
          minItems: 2
          maxItems: 2
        signature:
          type: string
        doc_comment:
          type: string
        visibility:
          type: string

    Episode:
      type: object
      required: [id, agent_id, event_count, significance]
      properties:
        id:
          type: integer
        agent_id:
          type: integer
        event_count:
          type: integer
        significance:
          type: number
          format: double
        outcome:
          type: string

    Memory:
      type: object
      description: A memory object formed from observed patterns

    Strategy:
      type: object
      description: A strategy extracted from agent behavior patterns

    GraphResponse:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"

    GraphNode:
      type: object
      required: [id, label, node_type, created_at, properties]
      properties:
        id:
          type: integer
        label:
          type: string
        node_type:
          type: string
        created_at:
          type: string
          format: date-time
        properties:
          type: object

    GraphEdge:
      type: object
      required: [id, from, to, edge_type, weight, confidence]
      properties:
        id:
          type: integer
        from:
          type: integer
        to:
          type: integer
        edge_type:
          type: string
        weight:
          type: number
          format: double
        confidence:
          type: number
          format: double

    GraphImportRequest:
      type: object
      properties:
        nodes:
          type: array
          items:
            type: object
            required: [name]
            properties:
              name:
                type: string
              type:
                type: string
              properties:
                type: object
        edges:
          type: array
          items:
            type: object
            required: [source, target]
            properties:
              source:
                type: string
              target:
                type: string
              type:
                type: string
              label:
                type: string
              weight:
                type: number
                format: double
              confidence:
                type: number
                format: double
              valid_from:
                type: string
                format: date-time
              valid_until:
                type: string
                format: date-time
              properties:
                type: object
        group_id:
          type: string

    GraphImportResponse:
      type: object
      required: [nodes_created, nodes_reused, edges_created, errors]
      properties:
        nodes_created:
          type: integer
        nodes_reused:
          type: integer
        edges_created:
          type: integer
        errors:
          type: array
          items:
            type: string

    StatsResponse:
      type: object
      required:
        - total_events_processed
        - total_nodes_created
        - total_episodes_detected
        - total_memories_formed
        - total_strategies_extracted
        - total_reinforcements_applied
        - average_processing_time_ms
        - stores
      properties:
        total_events_processed:
          type: integer
        total_nodes_created:
          type: integer
        total_episodes_detected:
          type: integer
        total_memories_formed:
          type: integer
        total_strategies_extracted:
          type: integer
        total_reinforcements_applied:
          type: integer
        average_processing_time_ms:
          type: number
          format: double
        stores:
          type: object

    WorldModelStatsResponse:
      type: object
      required: [enabled, mode, planning]
      properties:
        enabled:
          type: boolean
        mode:
          type: string
        planning:
          type: object
          required: [strategy_generation_enabled, action_generation_enabled]
          properties:
            strategy_generation_enabled:
              type: boolean
            action_generation_enabled:
              type: boolean

    AnalyticsResponse:
      type: object
      required:
        - node_count
        - edge_count
        - connected_components
        - largest_component_size
        - average_path_length
        - diameter
        - clustering_coefficient
        - average_clustering
        - modularity
        - community_count
        - learning_metrics
      properties:
        node_count:
          type: integer
        edge_count:
          type: integer
        connected_components:
          type: integer
        largest_component_size:
          type: integer
        average_path_length:
          type: number
          format: double
        diameter:
          type: integer
        clustering_coefficient:
          type: number
          format: double
        average_clustering:
          type: number
          format: double
        modularity:
          type: number
          format: double
        community_count:
          type: integer
        learning_metrics:
          $ref: "#/components/schemas/LearningMetrics"

    LearningMetrics:
      type: object
      required:
        - total_events
        - unique_contexts
        - learned_patterns
        - strong_memories
        - overall_success_rate
        - average_edge_weight
      properties:
        total_events:
          type: integer
        unique_contexts:
          type: integer
        learned_patterns:
          type: integer
        strong_memories:
          type: integer
        overall_success_rate:
          type: number
          format: double
        average_edge_weight:
          type: number
          format: double

    CommunitiesResponse:
      type: object
      required: [communities, modularity, iterations, community_count, algorithm]
      properties:
        communities:
          type: array
          items:
            type: object
            required: [community_id, node_ids, size]
            properties:
              community_id:
                type: integer
              node_ids:
                type: array
                items:
                  type: integer
              size:
                type: integer
        modularity:
          type: number
          format: double
        iterations:
          type: integer
        community_count:
          type: integer
        algorithm:
          type: string

    CentralityScore:
      type: object
      required: [node_id, degree, betweenness, closeness, eigenvector, pagerank, combined]
      properties:
        node_id:
          type: integer
        degree:
          type: number
          format: double
        betweenness:
          type: number
          format: double
        closeness:
          type: number
          format: double
        eigenvector:
          type: number
          format: double
        pagerank:
          type: number
          format: double
        combined:
          type: number
          format: double

    PPRResponse:
      type: object
      required: [source_node_id, algorithm, scores]
      properties:
        source_node_id:
          type: integer
        algorithm:
          type: string
        scores:
          type: array
          items:
            type: object
            required: [node_id, score]
            properties:
              node_id:
                type: integer
              score:
                type: number
                format: double

    ReachabilityResponse:
      type: object
      required: [source_node_id, reachable_count, max_depth, edges_traversed, reachable]
      properties:
        source_node_id:
          type: integer
        reachable_count:
          type: integer
        max_depth:
          type: integer
        edges_traversed:
          type: integer
        reachable:
          type: array
          items:
            type: object
            required: [node_id, origin, arrival_time, hops]
            properties:
              node_id:
                type: integer
              origin:
                type: string
              arrival_time:
                type: string
                format: date-time
              hops:
                type: integer
              predecessor:
                type: integer

    CausalPathResponse:
      type: object
      required: [source, target, found]
      properties:
        source:
          type: integer
        target:
          type: integer
        found:
          type: boolean
        path:
          type: array
          items:
            type: integer

    QueryResponse:
      type: object
      required: [columns, rows]
      properties:
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: array
            items: {}
        stats:
          type: object
          properties:
            nodes_scanned:
              type: integer
            edges_traversed:
              type: integer
            execution_time_ms:
              type: number
              format: double

    SubscriptionCreatedResponse:
      type: object
      required: [subscription_id, initial, strategy]
      properties:
        subscription_id:
          type: string
        initial:
          type: object
          required: [columns, rows]
          properties:
            columns:
              type: array
              items:
                type: string
            rows:
              type: array
              items:
                type: array
                items: {}
        strategy:
          type: string

    SubscriptionInfo:
      type: object
      required: [subscription_id, query, strategy, cached_row_count]
      properties:
        subscription_id:
          type: string
        query:
          type: string
        strategy:
          type: string
        cached_row_count:
          type: integer

    SubscriptionUpdate:
      type: object
      required: [subscription_id, inserts, deletes, was_full_rerun]
      properties:
        subscription_id:
          type: string
        inserts:
          type: array
          items:
            type: array
            items: {}
        deletes:
          type: array
          items:
            type: array
            items: {}
        count:
          type: integer
        was_full_rerun:
          type: boolean

    NLQRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
        group_id:
          type: string
        limit:
          type: integer
        offset:
          type: integer
        session_id:
          type: integer
        include_context:
          type: boolean
        metadata:
          type: object

    NLQResponse:
      type: object
      required:
        - answer
        - intent
        - entities_resolved
        - confidence
        - result_count
        - execution_time_ms
        - query_used
        - explanation
        - total_count
      properties:
        answer:
          type: string
        intent:
          type: string
        entities_resolved:
          type: array
          items:
            type: object
            required: [text, node_id, node_type, confidence]
            properties:
              text:
                type: string
              node_id:
                type: integer
              node_type:
                type: string
              confidence:
                type: number
                format: double
        confidence:
          type: number
          format: double
        result_count:
          type: integer
        execution_time_ms:
          type: number
          format: double
        query_used:
          type: string
        explanation:
          type: array
          items:
            type: string
        total_count:
          type: integer

    SearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        mode:
          type: string
          enum: [keyword, semantic, hybrid]
        limit:
          type: integer
        fusion_strategy:
          type: string

    SearchResponse:
      type: object
      required: [results, mode, total]
      properties:
        results:
          type: array
          items:
            type: object
            required: [node_id, score, node_type, properties]
            properties:
              node_id:
                type: integer
              score:
                type: number
                format: double
              node_type:
                type: string
              properties:
                type: object
        mode:
          type: string
        total:
          type: integer

    Claim:
      type: object
      description: A claim extracted from events

    ClaimSearchResponse:
      type: object
      required: [groups, ungrouped, total_results]
      properties:
        groups:
          type: array
          items:
            type: object
            required: [subject, claims]
            properties:
              subject:
                type: string
              claims:
                type: array
                items:
                  $ref: "#/components/schemas/Claim"
        ungrouped:
          type: array
          items:
            $ref: "#/components/schemas/Claim"
        total_results:
          type: integer

    StructuredMemoryUpsertRequest:
      type: object
      required: [key, template]
      properties:
        key:
          type: string
        template:
          $ref: "#/components/schemas/StructuredMemoryTemplate"

    StructuredMemoryTemplate:
      oneOf:
        - type: object
          required: [Ledger]
          properties:
            Ledger:
              type: object
              required: [entity_pair, entries, balance, provenance]
              properties:
                entity_pair:
                  type: array
                  items:
                    type: string
                  minItems: 2
                  maxItems: 2
                entries:
                  type: array
                  items:
                    type: object
                balance:
                  type: number
                  format: double
                provenance:
                  type: string
        - type: object
          required: [StateMachine]
          properties:
            StateMachine:
              type: object
              required: [entity, current_state, history, provenance]
              properties:
                entity:
                  type: string
                current_state:
                  type: string
                history:
                  type: array
                  items:
                    type: object
                provenance:
                  type: string
        - type: object
          required: [Tree]
          properties:
            Tree:
              type: object
              required: [root, children, provenance]
              properties:
                root:
                  type: string
                children:
                  type: object
                  additionalProperties:
                    type: array
                    items:
                      type: string
                provenance:
                  type: string
        - type: object
          required: [PreferenceList]
          properties:
            PreferenceList:
              type: object
              required: [entity, ranked_items, provenance]
              properties:
                entity:
                  type: string
                ranked_items:
                  type: array
                  items:
                    type: object
                provenance:
                  type: string

    HealthResponse:
      type: object
      required: [status, version, uptime_seconds, is_healthy, node_count, edge_count, processing_rate, write_lanes, read_gate, sequence_tracker]
      properties:
        status:
          type: string
        version:
          type: string
        uptime_seconds:
          type: number
          format: double
        is_healthy:
          type: boolean
        node_count:
          type: integer
        edge_count:
          type: integer
        processing_rate:
          type: number
          format: double
        write_lanes:
          $ref: "#/components/schemas/WriteLanes"
        read_gate:
          $ref: "#/components/schemas/ReadGate"
