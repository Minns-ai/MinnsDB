openapi: 3.1.0
info:
  title: MinnsDB API
  description: REST API for MinnsDB — the agentic database
  version: 0.1.0
servers:
  - url: http://localhost:3000
    description: Local development server

security:
  - BearerAuth: []

tags:
  - name: Health
    description: Health checks and server info
  - name: Events
    description: Event ingestion and retrieval
  - name: CodeIntelligence
    description: Code review, file, and search operations
  - name: Episodes
    description: Episode detection and listing
  - name: Memories
    description: Agent memory retrieval
  - name: Strategies
    description: Strategy extraction and similarity search
  - name: Graph
    description: Graph operations, import, and persistence
  - name: Analytics
    description: Graph analytics, centrality, communities, and paths
  - name: MinnsQL
    description: MinnsQL query execution
  - name: NLQ
    description: Natural language query interface
  - name: Search
    description: Keyword, semantic, and hybrid search
  - name: Claims
    description: Claim extraction and search
  - name: StructuredMemory
    description: Ledgers, state machines, trees, and preference lists
  - name: Workflows
    description: Workflow creation and management
  - name: Agents
    description: Agent registration and listing
  - name: Messages
    description: Single message ingestion
  - name: Conversations
    description: Batch conversation ingestion
  - name: Ontology
    description: OWL/RDFS ontology management
  - name: Subscriptions
    description: Reactive query subscriptions
  - name: Tables
    description: Relational table operations
  - name: WASM
    description: WebAssembly module management
  - name: Auth
    description: API key management
  - name: Admin
    description: Database export and import
  - name: Planning
    description: Strategy and action planning

paths:
  /:
    get:
      operationId: getRootInfo
      tags: [Health]
      summary: Root info page
      security: []
      responses:
        "200":
          description: HTML info page
          content:
            text/html:
              schema:
                type: string

  /docs:
    get:
      operationId: getDocsPage
      tags: [Health]
      summary: API documentation page
      security: []
      responses:
        "200":
          description: HTML documentation page
          content:
            text/html:
              schema:
                type: string

  /api/health:
    get:
      operationId: getHealth
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/events:
    post:
      operationId: processEvent
      tags: [Events]
      summary: Process a full event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event]
              properties:
                event:
                  $ref: "#/components/schemas/Event"
                enable_semantic:
                  type: boolean
      responses:
        "200":
          description: Event processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"
    get:
      operationId: getEvents
      tags: [Events]
      summary: Get events
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  /api/events/simple:
    post:
      operationId: processSimpleEvent
      tags: [Events]
      summary: Process a simple event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimpleEventRequest"
      responses:
        "200":
          description: Event processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/events/state-change:
    post:
      operationId: processStateChangeEvent
      tags: [Events]
      summary: Process a state change event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StateChangeEventRequest"
      responses:
        "200":
          description: Event processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/events/transaction:
    post:
      operationId: processTransactionEvent
      tags: [Events]
      summary: Process a transaction event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionEventRequest"
      responses:
        "200":
          description: Event processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/events/code-review:
    post:
      operationId: processCodeReviewEvent
      tags: [CodeIntelligence]
      summary: Process a code review event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CodeReviewEventRequest"
      responses:
        "200":
          description: Event processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/events/code-file:
    post:
      operationId: processCodeFileEvent
      tags: [CodeIntelligence]
      summary: Process a code file snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CodeFileEventRequest"
      responses:
        "200":
          description: Event processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/code/search:
    post:
      operationId: searchCode
      tags: [CodeIntelligence]
      summary: Search code entities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CodeSearchRequest"
      responses:
        "200":
          description: Code search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeSearchResponse"

  /api/episodes:
    get:
      operationId: getEpisodes
      tags: [Episodes]
      summary: List episodes
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of episodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Episode"

  /api/memories/agent/{agent_id}:
    get:
      operationId: getAgentMemories
      tags: [Memories]
      summary: Get agent memories
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Memory"

  /api/memories/context:
    post:
      operationId: getMemoriesByContext
      tags: [Memories]
      summary: Get memories by context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context]
              properties:
                context:
                  $ref: "#/components/schemas/EventContext"
                limit:
                  type: integer
                min_similarity:
                  type: number
                  format: double
                agent_id:
                  type: integer
                session_id:
                  type: integer
      responses:
        "200":
          description: Matching memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Memory"

  /api/strategies/agent/{agent_id}:
    get:
      operationId: getAgentStrategies
      tags: [Strategies]
      summary: Get agent strategies
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of strategies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Strategy"

  /api/strategies/similar:
    post:
      operationId: findSimilarStrategies
      tags: [Strategies]
      summary: Find similar strategies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                goal_ids:
                  type: array
                  items:
                    type: integer
                tool_names:
                  type: array
                  items:
                    type: string
                result_types:
                  type: array
                  items:
                    type: string
                context_hash:
                  type: string
                agent_id:
                  type: integer
                limit:
                  type: integer
                min_score:
                  type: number
                  format: double
      responses:
        "200":
          description: Similar strategies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Strategy"

  /api/suggestions:
    get:
      operationId: getSuggestions
      tags: [Strategies]
      summary: Get action suggestions
      parameters:
        - name: context_hash
          in: query
          required: true
          schema:
            type: string
        - name: last_action_node
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Action suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /api/graph:
    get:
      operationId: getGraph
      tags: [Graph]
      summary: Get graph nodes and edges
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: session_id
          in: query
          schema:
            type: integer
        - name: agent_type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Graph data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphResponse"

  /api/graph/context:
    get:
      operationId: getGraphForContext
      tags: [Graph]
      summary: Get graph for a specific context
      parameters:
        - name: context_hash
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: session_id
          in: query
          schema:
            type: integer
        - name: agent_type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Graph data for context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphResponse"

  /api/graph/persist:
    post:
      operationId: persistGraph
      tags: [Graph]
      summary: Persist graph to disk
      responses:
        "200":
          description: Persistence result
          content:
            application/json:
              schema:
                type: object
                required: [success, nodes_persisted, edges_persisted]
                properties:
                  success:
                    type: boolean
                  nodes_persisted:
                    type: integer
                  edges_persisted:
                    type: integer

  /api/graph/import:
    post:
      operationId: importGraph
      tags: [Graph]
      summary: Bulk import nodes and edges
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphImportRequest"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphImportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/stats:
    get:
      operationId: getStats
      tags: [Graph]
      summary: Get processing stats
      responses:
        "200":
          description: Processing statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"

  /api/world-model/stats:
    get:
      operationId: getWorldModelStats
      tags: [Graph]
      summary: Get world model stats
      responses:
        "200":
          description: World model statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorldModelStatsResponse"

  /api/analytics:
    get:
      operationId: getAnalytics
      tags: [Analytics]
      summary: Get graph analytics
      responses:
        "200":
          description: Graph analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsResponse"

  /api/indexes:
    get:
      operationId: getIndexes
      tags: [Analytics]
      summary: Get index stats
      responses:
        "200":
          description: Index statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /api/communities:
    get:
      operationId: getCommunities
      tags: [Analytics]
      summary: Community detection
      parameters:
        - name: algorithm
          in: query
          schema:
            type: string
            enum: [louvain, label_propagation]
      responses:
        "200":
          description: Community detection results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunitiesResponse"

  /api/centrality:
    get:
      operationId: getCentrality
      tags: [Analytics]
      summary: Centrality scores
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Centrality scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CentralityScore"

  /api/ppr:
    get:
      operationId: getPersonalizedPageRank
      tags: [Analytics]
      summary: Personalized PageRank
      parameters:
        - name: source_node_id
          in: query
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: min_score
          in: query
          schema:
            type: number
            format: double
      responses:
        "200":
          description: Personalized PageRank scores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PPRResponse"

  /api/reachability:
    get:
      operationId: getReachability
      tags: [Analytics]
      summary: Temporal reachability
      parameters:
        - name: source
          in: query
          required: true
          schema:
            type: integer
        - name: max_hops
          in: query
          schema:
            type: integer
        - name: max_results
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Reachability results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReachabilityResponse"

  /api/causal-path:
    get:
      operationId: getCausalPath
      tags: [Analytics]
      summary: Find causal path between nodes
      parameters:
        - name: source
          in: query
          required: true
          schema:
            type: integer
        - name: target
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Causal path result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CausalPathResponse"

  /api/query:
    post:
      operationId: executeQuery
      tags: [MinnsQL]
      summary: Execute a MinnsQL query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                group_id:
                  type: string
      responses:
        "200":
          description: Query results (standard or subscription)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/QueryResponse"
                  - $ref: "#/components/schemas/SubscriptionCreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/nlq:
    post:
      operationId: naturalLanguageQuery
      tags: [NLQ]
      summary: Natural language query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NLQRequest"
      responses:
        "200":
          description: NLQ result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NLQResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/search:
    post:
      operationId: search
      tags: [Search]
      summary: Search nodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"

  /api/claims:
    get:
      operationId: listClaims
      tags: [Claims]
      summary: List claims
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: event_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of claims
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Claim"

  /api/claims/{id}:
    get:
      operationId: getClaimById
      tags: [Claims]
      summary: Get claim by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Claim details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Claim"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/claims/search:
    post:
      operationId: searchClaims
      tags: [Claims]
      summary: Search claims
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query_text]
              properties:
                query_text:
                  type: string
                top_k:
                  type: integer
                min_similarity:
                  type: number
                  format: double
      responses:
        "200":
          description: Claim search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimSearchResponse"

  /api/embeddings/process:
    post:
      operationId: processEmbeddings
      tags: [Claims]
      summary: Process embeddings for claims
      responses:
        "200":
          description: Embeddings processed
          content:
            application/json:
              schema:
                type: object
                required: [claims_processed, success]
                properties:
                  claims_processed:
                    type: integer
                  success:
                    type: boolean

  /api/structured-memory:
    post:
      operationId: upsertStructuredMemory
      tags: [StructuredMemory]
      summary: Upsert structured memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StructuredMemoryUpsertRequest"
      responses:
        "204":
          description: Upserted successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"
    get:
      operationId: listStructuredMemoryKeys
      tags: [StructuredMemory]
      summary: List structured memory keys
      parameters:
        - name: prefix
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of keys
          content:
            application/json:
              schema:
                type: object
                required: [keys, count]
                properties:
                  keys:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer

  /api/structured-memory/{key}:
    get:
      operationId: getStructuredMemory
      tags: [StructuredMemory]
      summary: Get structured memory value
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Structured memory value
          content:
            application/json:
              schema:
                type: object
                required: [key, template]
                properties:
                  key:
                    type: string
                  template:
                    $ref: "#/components/schemas/StructuredMemoryTemplate"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteStructuredMemory
      tags: [StructuredMemory]
      summary: Delete structured memory
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [success, key]
                properties:
                  success:
                    type: boolean
                  key:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/structured-memory/ledger/{key}/append:
    post:
      operationId: appendLedgerEntry
      tags: [StructuredMemory]
      summary: Append ledger entry
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, description, direction]
              properties:
                amount:
                  type: number
                  format: double
                description:
                  type: string
                direction:
                  type: string
                  enum: [Credit, Debit]
      responses:
        "200":
          description: Entry appended
          content:
            application/json:
              schema:
                type: object
                required: [success, balance]
                properties:
                  success:
                    type: boolean
                  balance:
                    type: number
                    format: double
        "404":
          $ref: "#/components/responses/NotFound"

  /api/structured-memory/ledger/{key}/balance:
    get:
      operationId: getLedgerBalance
      tags: [StructuredMemory]
      summary: Get ledger balance
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Balance
          content:
            application/json:
              schema:
                type: object
                required: [key, balance]
                properties:
                  key:
                    type: string
                  balance:
                    type: number
                    format: double
        "404":
          $ref: "#/components/responses/NotFound"

  /api/structured-memory/state/{key}/transition:
    post:
      operationId: stateTransition
      tags: [StructuredMemory]
      summary: Transition state machine
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_state, trigger]
              properties:
                new_state:
                  type: string
                trigger:
                  type: string
      responses:
        "200":
          description: Transition applied
          content:
            application/json:
              schema:
                type: object
                required: [success, new_state]
                properties:
                  success:
                    type: boolean
                  new_state:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/structured-memory/state/{key}/current:
    get:
      operationId: getCurrentState
      tags: [StructuredMemory]
      summary: Get current state
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current state
          content:
            application/json:
              schema:
                type: object
                required: [key, current_state]
                properties:
                  key:
                    type: string
                  current_state:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/structured-memory/preference/{key}/update:
    post:
      operationId: updatePreference
      tags: [StructuredMemory]
      summary: Update preference list
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [item, rank]
              properties:
                item:
                  type: string
                rank:
                  type: integer
                score:
                  type: number
                  format: double
      responses:
        "200":
          description: Preference updated
